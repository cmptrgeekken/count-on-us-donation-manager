services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file:
      - path: ${APP_ENV_FILE:-.env.production}
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://countonus:${DB_PASSWORD}@db:5432/countonus?connection_limit=${DATABASE_POOL_SIZE:-5}
    expose:
      - "3000"
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 256
    mem_limit: 768m

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: countonus
      POSTGRES_USER: countonus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U countonus -d countonus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
